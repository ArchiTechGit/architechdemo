<!DOCTYPE html>

<head>

  <link rel="icon" type="image/png" href="./brand_assets/senate-logo-white.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: #060810; color: #D8EDF5; font-family: 'Space Mono', monospace; display: flex; align-items: center; justify-content: center; }

    .toc-divider { width: 100%; height: 1px; background: rgba(120,175,210,0.10); margin: 4px 0; }

    .toc-item:hover { color: #D8EDF5; }
    .toc-item:focus-visible { outline: 2px solid #C86A28; outline-offset: 4px; }
    .toc-num { font-size: 9px; color: #243545; min-width: 20px; }
  </style>
</head>

  <nav class="toc" aria-label="Demos">
