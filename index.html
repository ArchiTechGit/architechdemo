<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchiTech Demo</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: #0D1825; color: #F0F6FC; font-family: 'Roboto', sans-serif; display: flex; align-items: center; justify-content: center; }
    .toc { display: flex; flex-direction: column; gap: 12px; }
    .toc-label { font-size: 9px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: #3D4F65; margin-bottom: 8px; }
    .toc-divider { width: 100%; height: 1px; background: rgba(5,195,221,0.10); margin: 4px 0; }
    .toc-item { display: flex; align-items: center; gap: 16px; text-decoration: none; color: #7F8FA9; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.2s ease; padding: 4px 0; }
    .toc-item:hover { color: #F0F6FC; }
    .toc-item:focus-visible { outline: 2px solid #05C3DD; outline-offset: 4px; }
    .toc-num { font-size: 9px; color: #3D4F65; min-width: 20px; }
    .toc-parent { display: flex; align-items: center; gap: 16px; color: #7F8FA9; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 0; cursor: pointer; background: none; border: none; font-family: inherit; width: 100%; transition: color 0.2s ease; }
    .toc-parent:hover { color: #F0F6FC; }
    .toc-parent:focus-visible { outline: 2px solid #05C3DD; outline-offset: 4px; }
    .toc-chevron { margin-left: auto; font-size: 9px; color: #3D4F65; transition: transform 0.2s ease; }
    .toc-submenu { display: none; flex-direction: column; gap: 8px; padding-left: 36px; margin-top: 4px; }
    .toc-submenu.open { display: flex; }
    .toc-sub-item { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #5A6E84; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; transition: color 0.2s ease; padding: 3px 0; }
    .toc-sub-item:hover { color: #F0F6FC; }
    .toc-sub-num { font-size: 8px; color: #3D4F65; min-width: 16px; }
  </style>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:flex-start;gap:32px;">
    <img src="/brand_assets/logo_darkbackground.png" alt="ArchiTech" style="width:200px;mix-blend-mode:screen;opacity:0.9;" />
    <nav class="toc" aria-label="Demos">
    <div class="toc-label">WxCC Demos</div>
    <div class="toc-divider"></div>
    <a href="/wxccworkflowdemo/dist/" class="toc-item">
      <span class="toc-num">01</span>
      <span>Workflow Demonstration</span>
    </a>
    <button class="toc-parent" onclick="toggleSubmenu(this)" aria-expanded="false">
      <span class="toc-num">02</span>
      <span>Demo Guides</span>
      <span class="toc-chevron">&#9654;</span>
    </button>
    <div class="toc-submenu" id="submenu-demoguides">
      <a href="/demoguides/" class="toc-sub-item">
        <span class="toc-sub-num">01</span>
        <span>Webex Contact Center</span>
      </a>
    </div>
    <a href="/discovery/" class="toc-item">
      <span class="toc-num">03</span>
      <span>Discovery Assessment</span>
    </a>
    <a href="/wxccroi-public/" class="toc-item">
      <span class="toc-num">04</span>
      <span>Digital Front Door ROI Calculator</span>
    </a>
    <a href="/wxccroidemo/dist/" class="toc-item">
      <span class="toc-num">05</span>
      <span>ROI Calculator (internal only)</span>
    </a>
  </nav>
  </div>
  <script>
    function toggleSubmenu(btn) {
      const submenu = btn.nextElementSibling;
      const chevron = btn.querySelector('.toc-chevron');
      const isOpen = submenu.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
      chevron.style.transform = isOpen ? 'rotate(90deg)' : '';
    }
  </script>
</body>
</html>
