<!DOCTYPE html>
<html lang="en">
<head>
<script src="/auth.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webex CC Resources — ArchiTech Demo</title>
<meta name="description" content="Central reference for all Webex Contact Center documentation — guides for admin, agents, supervisors, APIs, AI, CRM connectors, reporting and workforce optimization." />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: #0D1825;
    color: #F0F6FC;
    font-family: 'Roboto', sans-serif;
    padding: 48px 24px 96px;
  }
  a { color: inherit; }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #7F8FA9;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 40px;
    transition: color 0.2s ease;
  }
  .back:hover { color: #05C3DD; }

  header.hub {
    max-width: 1100px;
    margin: 0 auto 40px;
  }
  .hub-eyebrow {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #05C3DD;
    margin-bottom: 12px;
  }
  .hub h1 {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    margin-bottom: 12px;
  }
  .hub p.sub {
    color: #7F8FA9;
    font-size: 15px;
    max-width: 720px;
    line-height: 1.6;
  }

  .search-wrap {
    max-width: 1100px;
    margin: 0 auto 32px;
    position: sticky;
    top: 16px;
    z-index: 10;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #101E30;
    border: 1px solid rgba(5,195,221,0.18);
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .search-box svg { flex-shrink: 0; color: #3D4F65; }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #F0F6FC;
    font-size: 15px;
    font-family: 'Roboto', sans-serif;
  }
  .search-box input::placeholder { color: #3D4F65; }
  .search-meta {
    margin-top: 10px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #3D4F65;
  }

  .filter-row {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-chip {
    border: 1px solid rgba(127,143,169,0.25);
    background: transparent;
    color: #7F8FA9;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Roboto', sans-serif;
  }
  .filter-chip:hover { color: #F0F6FC; border-color: rgba(5,195,221,0.4); }
  .filter-chip.active {
    color: #0D1825;
    background: #05C3DD;
    border-color: #05C3DD;
  }

  main {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .category {
    border: 1px solid rgba(127,143,169,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.015);
    overflow: hidden;
  }
  .category-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }
  .category-head:hover { background: rgba(5,195,221,0.04); }
  .category-title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .category-title { font-size: 18px; font-weight: 700; }
  .category-subtitle { font-size: 13px; color: #7F8FA9; }
  .category-count {
    font-size: 12px;
    color: #05C3DD;
    border: 1px solid rgba(5,195,221,0.3);
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .chevron {
    color: #3D4F65;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }
  .category.open .chevron { transform: rotate(90deg); }

  .category-body {
    display: none;
    padding: 0 24px 24px;
    flex-direction: column;
    gap: 20px;
  }
  .category.open .category-body { display: flex; }

  .subcategory-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #3D4F65;
    margin-bottom: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(127,143,169,0.1);
  }
  .subcategory:first-child .subcategory-title { border-top: none; padding-top: 0; }

  .link-list { display: flex; flex-direction: column; gap: 2px; }
  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    text-decoration: none;
    color: #DDE6F0;
    font-size: 14px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .link-row:hover { background: rgba(5,195,221,0.08); color: #05C3DD; }
  .link-row .link-name { flex: 1; }
  .link-row .link-domain {
    font-size: 11px;
    color: #3D4F65;
    white-space: nowrap;
  }

  mark {
    background: rgba(5,195,221,0.35);
    color: #F0F6FC;
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty-state {
    max-width: 1100px;
    margin: 60px auto;
    text-align: center;
    color: #3D4F65;
    font-size: 14px;
  }

  footer.hub-footer {
    max-width: 1100px;
    margin: 48px auto 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #3D4F65;
  }
</style>
</head>
<body>

  <a href="/" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back to demos
  </a>

  <header class="hub">
    <div class="hub-eyebrow">Webex CC Resources</div>
    <h1>Webex Contact Center Documentation Hub</h1>
    <p class="sub">Central reference for all WxCC documentation — <span id="doc-count">438</span> guides organised across <span id="cat-count">9</span> categories.</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search guides by name, category or subcategory..." autocomplete="off" />
    </div>
    <div class="search-meta" id="search-meta"></div>
  </div>

  <div class="filter-row" id="filter-row"></div>

  <main id="main"></main>

  <div class="empty-state" id="empty-state" style="display:none;">No guides match your search.</div>

  <footer class="hub-footer">Webex Contact Center Documentation Guide &middot; Engineered by Grant Hansen</footer>

<script>
let DATA = [];
let activeCategory = null;
let query = '';
const openState = new Set();

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
}

function domainOf(url) {
  try { return new URL(url).hostname.replace(/^www\./, ''); } catch (e) { return ''; }
}

function totalLinks(cat) {
  return cat.subcategories.reduce((n, sc) => n + sc.links.length, 0);
}

function matchesQuery(catTitle, subTitle, linkName, q) {
  q = q.toLowerCase();
  return linkName.toLowerCase().includes(q) || catTitle.toLowerCase().includes(q) || subTitle.toLowerCase().includes(q);
}

function render() {
  const main = document.getElementById('main');
  const filterRow = document.getElementById('filter-row');
  const emptyState = document.getElementById('empty-state');
  const searchMeta = document.getElementById('search-meta');

  filterRow.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip' + (activeCategory === null ? ' active' : '');
  allChip.textContent = 'All Categories';
  allChip.onclick = () => { activeCategory = null; render(); };
  filterRow.appendChild(allChip);

  DATA.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip' + (activeCategory === cat.id ? ' active' : '');
    chip.textContent = cat.title;
    chip.onclick = () => { activeCategory = (activeCategory === cat.id ? null : cat.id); render(); };
    filterRow.appendChild(chip);
  });

  main.innerHTML = '';
  let visibleCount = 0;
  let matchedLinks = 0;

  DATA.forEach(cat => {
    if (activeCategory && cat.id !== activeCategory) return;

    const subBlocks = [];
    cat.subcategories.forEach(sc => {
      const links = sc.links.filter(l => !query || matchesQuery(cat.title, sc.title, l.name, query));
      if (links.length === 0) return;
      matchedLinks += links.length;
      const linkRows = links.map(l => (
        '<a class="link-row" href="' + l.url + '" target="_blank" rel="noopener noreferrer">' +
          '<span class="link-name">' + highlight(l.name, query) + '</span>' +
          '<span class="link-domain">' + escapeHtml(domainOf(l.url)) + '</span>' +
        '</a>'
      )).join('');
      subBlocks.push(
        '<div class="subcategory">' +
          '<div class="subcategory-title">' + highlight(sc.title, query) + '</div>' +
          '<div class="link-list">' + linkRows + '</div>' +
        '</div>'
      );
    });

    if (subBlocks.length === 0) return;
    visibleCount++;

    const isOpen = query ? true : openState.has(cat.id);
    const el = document.createElement('div');
    el.className = 'category' + (isOpen ? ' open' : '');
    el.innerHTML =
      '<div class="category-head">' +
        '<div class="category-title-wrap">' +
          '<div class="category-title">' + highlight(cat.title, query) + '</div>' +
          '<div class="category-subtitle">' + escapeHtml(cat.subtitle) + '</div>' +
        '</div>' +
        '<div class="category-count">' + totalLinks(cat) + ' docs</div>' +
        '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' +
      '</div>' +
      '<div class="category-body">' + subBlocks.join('') + '</div>';

    el.querySelector('.category-head').onclick = () => {
      if (openState.has(cat.id)) openState.delete(cat.id);
      else openState.add(cat.id);
      render();
    };

    main.appendChild(el);
  });

  emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
  searchMeta.textContent = query ? (matchedLinks + ' result' + (matchedLinks === 1 ? '' : 's') + ' for "' + query + '"') : '';
}

function init(data) {
  DATA = data;
  document.getElementById('cat-count').textContent = data.length;
  document.getElementById('doc-count').textContent = data.reduce((n, c) => n + totalLinks(c), 0);
  render();

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', e => {
    query = e.target.value.trim();
    render();
  });
}

fetch('data.json').then(r => r.json()).then(init).catch(err => {
  document.getElementById('main').innerHTML = '<p style="color:#7F8FA9;">Failed to load documentation data: ' + err.message + '</p>';
});
</script>
</body>
</html>
