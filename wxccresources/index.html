<!DOCTYPE html>
<html lang="en">
<head>
<script src="/auth.js"></script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Webex CC Resources — ArchiTech Demo</title>
<meta name="description" content="Central reference for all Webex Contact Center documentation — guides for admin, agents, supervisors, APIs, AI, CRM connectors, reporting and workforce optimization." />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }

  :root {
    --bg: #0B1220;
    --bg-panel: #0E1626;
    --bg-card: #101A2C;
    --border: rgba(148,163,184,0.14);
    --border-strong: rgba(148,163,184,0.24);
    --text: #F0F6FC;
    --text-dim: #93A3B8;
    --text-faint: #4B5B72;
    --accent: #4DA6FF;
    --accent-soft: rgba(77,166,255,0.14);
    --header-grad-a: #0A101E;
    --header-grad-b: #16243D;
  }
  body.light {
    --bg: #F4F6F9;
    --bg-panel: #FFFFFF;
    --bg-card: #FFFFFF;
    --border: rgba(15,23,42,0.10);
    --border-strong: rgba(15,23,42,0.18);
    --text: #0F172A;
    --text-dim: #55647A;
    --text-faint: #94A3B8;
    --accent: #1D7AE0;
    --accent-soft: rgba(29,122,224,0.10);
    --header-grad-a: #EEF2F8;
    --header-grad-b: #DCE6F2;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    transition: background 0.2s ease, color 0.2s ease;
  }
  a { color: inherit; }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 16px 32px 0;
    transition: color 0.2s ease;
  }
  .back:hover { color: var(--accent); }

  header.hub {
    background: linear-gradient(120deg, var(--header-grad-a), var(--header-grad-b));
    padding: 32px 32px 40px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    flex-wrap: wrap;
  }
  .hub-left { max-width: 640px; flex: 1; min-width: 320px; }
  .hub h1 {
    font-size: clamp(30px, 4vw, 44px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .hub p.sub {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .hub p.sub b { color: var(--text); font-weight: 700; }

  .search-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    padding: 14px 18px;
    max-width: 560px;
  }
  .search-box svg { flex-shrink: 0; color: var(--text-faint); }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: 'Roboto', sans-serif;
  }
  .search-box input::placeholder { color: var(--text-faint); }

  .hero-graphic {
    width: 280px;
    height: 160px;
    border-radius: 14px;
    background: radial-gradient(circle at 30% 20%, #2a5fd9 0%, #12203f 60%, #0a1428 100%);
    border: 1px solid var(--border-strong);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .hero-graphic .rings { display: flex; }
  .hero-graphic .ring {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 4px solid #fff;
    margin-left: -10px;
  }
  .hero-graphic .ring:first-child { margin-left: 0; background: #6ADFEB; border-color: #6ADFEB; }
  .hero-graphic .ring:last-child { background: #fff; }
  .hero-graphic .wordmark { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .hero-graphic .wordmark span { font-weight: 400; opacity: 0.75; font-size: 12px; }

  .control-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .category-select {
    appearance: none;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text);
    font-size: 13px;
    font-family: 'Roboto', sans-serif;
    padding: 10px 36px 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2393A3B8' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Roboto', sans-serif;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--accent); }

  .search-meta {
    padding: 0 32px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .search-meta:not(:empty) { padding-top: 16px; }

  main {
    padding: 24px 32px 96px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .category-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .category-icon {
    width: 40px;
    height: 40px;
    border-radius: 9px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .category-title { font-size: 19px; font-weight: 700; }
  .category-subtitle { font-size: 13px; color: var(--text-dim); }
  .category-subtitle::before { content: ''; }

  .subcategory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .subcategory-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .subcategory-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .link-list { display: flex; flex-direction: column; gap: 4px; }
  .link-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 0;
    font-size: 13.5px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }
  .link-row:first-child { border-top: none; }
  .link-row .link-name { flex: 1; color: var(--text); }

  .link-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 11.5px;
    font-weight: 500;
    font-family: 'Roboto', sans-serif;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .link-btn:hover { color: var(--text); border-color: var(--accent); }
  .link-btn.copy-btn.copied { color: var(--accent); border-color: var(--accent); }
  .link-btn svg { flex-shrink: 0; }

  mark {
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    padding: 60px 32px;
  }

  footer.hub-footer {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 32px 32px 64px;
  }
</style>
</head>
<body>

  <a href="/" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    Back to demos
  </a>

  <header class="hub">
    <div class="hub-left">
      <h1>Webex Contact Center<br/>Documentation Hub</h1>
      <p class="sub">Your central reference for all WxCC documentation — <b><span id="doc-count">438</span> guides</b> organised across <b><span id="cat-count">9</span> categories</b>.</p>
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search documentation..." autocomplete="off" />
      </div>
    </div>
    <div class="hero-graphic">
      <div class="rings"><div class="ring"></div><div class="ring"></div></div>
      <div class="wordmark">webex <span>by Cisco</span></div>
    </div>
  </header>

  <div class="control-bar">
    <select id="category-select" class="category-select"></select>
    <button type="button" class="theme-toggle" id="theme-toggle">
      <svg id="theme-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <div class="search-meta" id="search-meta"></div>

  <main id="main"></main>

  <div class="empty-state" id="empty-state" style="display:none;">No guides match your search.</div>

  <footer class="hub-footer">Webex Contact Center Documentation Guide &middot; Engineered by Grant Hansen</footer>

<script>
let DATA = [];
let activeCategory = '';
let query = '';

const ICONS = {
  Globe: '<circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20 15 15 0 010-20z"/>',
  Settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3.5a2 2 0 010-4H3.5a1.65 1.65 0 001.5-1.51 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09A1.65 1.65 0 0015 4.6a1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019 9c0 .67.34 1.24 1.51 1.51H21a2 2 0 010 4h-.09A1.65 1.65 0 0019.4 15z"/>',
  MessageSquare: '<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',
  Users: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>',
  Bot: '<rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 16h.01M16 16h.01"/>',
  Megaphone: '<path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 11-5.8-1.6"/>',
  Link2: '<path d="M9 17H7a5 5 0 010-10h2M15 7h2a5 5 0 010 10h-2M8 12h8"/>',
  BarChart: '<path d="M12 20V10M18 20V4M6 20v-4"/>',
  Briefcase: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>'
};
function iconSvg(name) {
  return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[name] || ICONS.Globe) + '</svg>';
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q) {
  if (!q) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
}

function totalLinks(cat) {
  return cat.subcategories.reduce((n, sc) => n + sc.links.length, 0);
}

function matchesQuery(catTitle, subTitle, linkName, q) {
  q = q.toLowerCase();
  return linkName.toLowerCase().includes(q) || catTitle.toLowerCase().includes(q) || subTitle.toLowerCase().includes(q);
}

function populateSelect() {
  const sel = document.getElementById('category-select');
  sel.innerHTML = '<option value="">All Categories</option>' +
    DATA.map(c => '<option value="' + c.id + '">' + escapeHtml(c.title) + '</option>').join('');
  sel.value = activeCategory;
  sel.onchange = () => { activeCategory = sel.value; render(); };
}

function render() {
  const main = document.getElementById('main');
  const emptyState = document.getElementById('empty-state');
  const searchMeta = document.getElementById('search-meta');

  main.innerHTML = '';
  let visibleCount = 0;
  let matchedLinks = 0;

  DATA.forEach(cat => {
    if (activeCategory && cat.id !== activeCategory) return;

    const subCards = [];
    cat.subcategories.forEach(sc => {
      const links = sc.links.filter(l => !query || matchesQuery(cat.title, sc.title, l.name, query));
      if (links.length === 0) return;
      matchedLinks += links.length;
      const linkRows = links.map(l => (
        '<div class="link-row">' +
          '<span class="link-name">' + highlight(l.name, query) + '</span>' +
          '<span class="link-actions">' +
            '<a class="link-btn open-btn" href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener noreferrer">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>' +
              'Open' +
            '</a>' +
            '<button type="button" class="link-btn copy-btn" data-url="' + escapeHtml(l.url) + '">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
              'Copy' +
            '</button>' +
          '</span>' +
        '</div>'
      )).join('');
      subCards.push(
        '<div class="subcategory-card">' +
          '<h3>' + highlight(sc.title, query) + '</h3>' +
          '<div class="link-list">' + linkRows + '</div>' +
        '</div>'
      );
    });

    if (subCards.length === 0) return;
    visibleCount++;

    const section = document.createElement('div');
    section.innerHTML =
      '<div class="category-head">' +
        '<div class="category-icon">' + iconSvg(cat.icon) + '</div>' +
        '<div>' +
          '<div class="category-title">' + highlight(cat.title, query) + '</div>' +
          '<div class="category-subtitle">' + escapeHtml(cat.subtitle) + ' &middot; ' + totalLinks(cat) + ' docs</div>' +
        '</div>' +
      '</div>' +
      '<div class="subcategory-grid">' + subCards.join('') + '</div>';

    main.appendChild(section);
  });

  emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
  searchMeta.textContent = query ? (matchedLinks + ' result' + (matchedLinks === 1 ? '' : 's') + ' for "' + query + '"') : '';

  main.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const url = btn.getAttribute('data-url');
      navigator.clipboard.writeText(url).then(() => {
        const original = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = original; }, 1500);
      });
    });
  });
}

function initTheme() {
  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-label');
  const saved = localStorage.getItem('wxcc-theme') || 'dark';
  function apply(mode) {
    document.body.classList.toggle('light', mode === 'light');
    label.textContent = mode === 'light' ? 'Dark' : 'Light';
    localStorage.setItem('wxcc-theme', mode);
  }
  apply(saved);
  toggle.addEventListener('click', () => {
    apply(document.body.classList.contains('light') ? 'dark' : 'light');
  });
}

function init(data) {
  DATA = data;
  document.getElementById('cat-count').textContent = data.length;
  document.getElementById('doc-count').textContent = data.reduce((n, c) => n + totalLinks(c), 0);
  populateSelect();
  render();

  const searchInput = document.getElementById('search');
  searchInput.addEventListener('input', e => {
    query = e.target.value.trim();
    render();
  });
}

initTheme();
fetch('data.json').then(r => r.json()).then(init).catch(err => {
  document.getElementById('main').innerHTML = '<p style="color:var(--text-dim);">Failed to load documentation data: ' + err.message + '</p>';
});
</script>
</body>
</html>
